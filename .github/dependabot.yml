version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    versioning-strategy: lockfile-only
    allow:
      - dependency-type: "all"
