name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
    inputs: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        py_version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: ${{ matrix.py_version }}
      BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
      BQ_DATASET: ${{ secrets.BQ_DATASET }}
      BQ_CREDS: ${{ secrets.BQ_CREDS }}
      GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Python ${{ matrix.py_version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.py_version }}
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      - name: Install Target Bigquery
        run: uv sync --frozen
      - name: Run SDK Tests
        run: uv run --frozen pytest -k test_core
      - name: Run Bigquery Unit Tests
        run: uv run --frozen pytest -k test_utils
      - name: Run Bigquery Integration Tests
        run: uv run --frozen pytest -k test_sync
